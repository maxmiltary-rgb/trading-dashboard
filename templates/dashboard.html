<!DOCTYPE html>
<html>
<head>
    <title>Trading Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        canvas {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }
        table {
            width: 100%;
            margin-top: 20px;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
        }
        th, td {
            padding: 10px;
            text-align: center;
        }
        th {
            background: #334155;
        }
    </style>
</head>
<body>

<h1>📊 Trading Dashboard</h1>

<div class="grid">
    <div class="card">Profit: <span id="profit">0</span></div>
    <div class="card">Winrate: <span id="winrate">0</span>%</div>
    <div class="card">Trades: <span id="total">0</span></div>
    <div class="card">Wins: <span id="wins">0</span></div>
</div>

<canvas id="profitChart"></canvas>

<table>
    <thead>
        <tr>
            <th>Symbol</th>
            <th>Type</th>
            <th>Profit</th>
            <th>Time</th>
        </tr>
    </thead>
    <tbody id="table"></tbody>
</table>

<script>
async function loadData() {
    let stats = await fetch('/stats').then(r => r.json());
    let trades = await fetch('/trades').then(r => r.json());

    document.getElementById('profit').innerText = stats.profit;
    document.getElementById('winrate').innerText = stats.winrate;
    document.getElementById('total').innerText = stats.total;
    document.getElementById('wins').innerText = stats.wins;

    let labels = [];
    let data = [];
    let cumulative = 0;

    trades.forEach(t => {
        cumulative += t.profit;
        labels.push(t.time);
        data.push(cumulative);
    });

    new Chart(document.getElementById('profitChart'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Equity Curve',
                data: data
            }]
        }
    });

    let table = document.getElementById("table");
    table.innerHTML = "";

    trades.forEach(t => {
        table.innerHTML += `
        <tr>
            <td>${t.symbol}</td>
            <td>${t.type}</td>
            <td>${t.profit}</td>
            <td>${t.time}</td>
        </tr>`;
    });
}

loadData();
</script>

</body>
</html>
