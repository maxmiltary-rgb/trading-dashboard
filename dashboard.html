<!DOCTYPE html>
<html>
<head>
<title>Trading Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0f172a; color:white; font-family:Arial; text-align:center; }
.container { display:flex; justify-content:center; flex-wrap:wrap; gap:15px; }
.card { background:#1e293b; padding:15px; border-radius:12px; width:180px; }
.table { margin:30px auto; width:90%; }
table { width:100%; border-collapse:collapse; }
td, th { padding:10px; border-bottom:1px solid #333; }
</style>
</head>

<body>

<h1>📊 Trading Dashboard</h1>

<div class="container">
<div class="card">Trades<br><span id="trades"></span></div>
<div class="card">Winrate<br><span id="winrate"></span></div>
<div class="card">PnL<br><span id="profit"></span></div>
<div class="card">Best Trade<br><span id="best"></span></div>
<div class="card">Worst Trade<br><span id="worst"></span></div>
</div>

<canvas id="equity"></canvas>
<canvas id="daily"></canvas>

<h2>📜 Trade History</h2>
<table>
<thead><tr><th>Time</th><th>Symbol</th><th>Type</th><th>Profit</th></tr></thead>
<tbody id="history"></tbody>
</table>

<script>
async function load() {
let res = await fetch("http://127.0.0.1:5000/stats");
let d = await res.json();

document.getElementById("trades").innerText = d.total_trades;
document.getElementById("winrate").innerText = d.winrate + "%";
document.getElementById("profit").innerText = d.profit;
document.getElementById("best").innerText = d.best_trade;
document.getElementById("worst").innerText = d.worst_trade;

// equity
new Chart(document.getElementById("equity"), {
type:"line",
data:{labels:d.equity.map((_,i)=>i),datasets:[{data:d.equity}]}
});

// daily
new Chart(document.getElementById("daily"), {
type:"bar",
data:{
labels:Object.keys(d.daily),
datasets:[{data:Object.values(d.daily)}]
}
});

// history
let html="";
d.history.forEach(t=>{
html += `<tr>
<td>${t.time}</td>
<td>${t.symbol}</td>
<td>${t.type}</td>
<td>${t.profit}</td>
</tr>`;
});
document.getElementById("history").innerHTML = html;
}

load();
setInterval(load,10000);
</script>

</body>
</html>
